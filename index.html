<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Царське Село</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, sans-serif;

      background:
        radial-gradient(circle at top, #1b1b1b 0%, #050505 70%);

      color: white;

      overflow: hidden;

      position: relative;
    }

    body::before {
      content: '';

      position: fixed;
      inset: 0;

      background:
        url('images/bg.jpg') center/cover no-repeat;

      opacity: 0.08;

      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 460px;

      margin: 20px;

      padding: 48px 32px;

      text-align: center;

      background: rgba(255, 255, 255, 0.03);

      border: 1px solid rgba(255, 255, 255, 0.08);

      border-radius: 28px;

      backdrop-filter: blur(6px);

      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 140px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 16px;

      font-size: 42px;
      line-height: 1.1;

      font-weight: 700;
    }

    p {
      margin: 0 0 36px;

      font-size: 18px;

      opacity: 0.7;
    }

    .button {
      display: inline-block;

      padding: 18px 42px;

      background: #d4af37;

      color: #111;

      text-decoration: none;

      font-size: 18px;
      font-weight: 700;

      border-radius: 16px;

      transition: 0.2s ease;

      box-shadow:
        0 4px 24px rgba(212, 175, 55, 0.25);
    }

    .button:hover {
      transform: translateY(-2px);

      box-shadow:
        0 8px 30px rgba(212, 175, 55, 0.35);
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
      }

      .logo {
        width: 120px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 16px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img
      src="logo.png"
      alt="Царське Село"
      class="logo"
    />

    <h1>
      Ласкаво просимо
    </h1>

    <p>
      Перегляньте наше меню
    </p>

    <a
      href="menu.pdf"
      target="_blank"
      class="button"
    >
      Відкрити меню
    </a>

  </div>

</body>
</html>
