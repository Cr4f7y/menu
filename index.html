<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Царське Село</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

      font-family: Arial, sans-serif;

      background:
        radial-gradient(circle at top,
          #1b1b1b 0%,
          #050505 70%);

      color: white;

      position: relative;
    }

    body::before {
      content: '';

      position: fixed;
      inset: 0;

      background:
        radial-gradient(circle at 20% 20%,
          rgba(212,175,55,0.04),
          transparent 40%);

      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 460px;

      padding: 48px 32px;

      text-align: center;

      background:
        rgba(20,20,20,0.94);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.35);
    }

    .logo {
      width: 120px;

      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 14px;

      font-size: 40px;
      line-height: 1.1;

      font-weight: 700;
    }

    p {
      margin: 0 0 34px;

      font-size: 17px;

      opacity: 0.7;
    }

    .button {
      display: inline-block;

      width: 100%;

      padding: 18px 24px;

      background: #d0b15c;

      color: #111;

      text-decoration: none;

      font-size: 18px;
      font-weight: 700;

      border-radius: 16px;

      transition: 0.2s ease;
    }

    .button:hover {
      opacity: 0.92;
    }

    .footer {
      margin-top: 26px;

      opacity: 0.4;

      font-size: 13px;
    }

    @media (max-width: 600px) {

      .container {
        padding: 40px 24px;
      }

      .logo {
        width: 100px;
      }

      h1 {
        font-size: 32px;
      }

      p {
        font-size: 15px;
      }

      .button {
        font-size: 16px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <img
      src="logo.png"
      alt="Царське Село"
      class="logo"
    >

    <h1>
      Ласкаво просимо
    </h1>

    <p>
      Перегляньте наше меню
    </p>

    <a
      href="menu.pdf"
      target="_blank"
      class="button"
    >
      Відкрити меню
    </a>

    <div class="footer">
      © Царське Село
    </div>

  </div>

</body>

</html>
